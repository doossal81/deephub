<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>Hire a Hacker | Request Service</title>
 <style>
 body {
 font-family: 'Courier New', Courier, monospace;
 background-color: #0d1117;
 color: #c9d1d9;
 margin: 0;
 padding: 0;
 display: flex;
 flex-direction: column;
 align-items: center;
 min-height: 100vh;
 }

 .container {
 width: 100%;
 max-width: 600px;
 padding: 2rem;
 box-sizing: border-box;
 }

 header {
 text-align: center;
 margin-bottom: 2rem;
 border-bottom: 2px solid #238636;
 padding-bottom: 1rem;
 }

 h1 {
 color: #238636;
 font-size: 2rem;
 text-transform: uppercase;
 letter-spacing: 2px;
 margin: 0;
 }

 p.subtitle {
 color: #8b949e;
 font-size: 0.9rem;
 margin-top: 0.5rem;
 }

 .form-group {
 margin-bottom: 1.5rem;
 }

 label {
 display: block;
 margin-bottom: 0.5rem;
 color: #58a6ff;
 font-weight: bold;
 }

 input, select, textarea {
 width: 100%;
 padding: 12px;
 background-color: #161b22;
 border: 1px solid #30363d;
 color: #c9d1d9;
 border-radius: 6px;
 font-family: inherit;
 font-size: 1rem;
 box-sizing: border-box;
 transition: border-color 0.3s;
 }

 input:focus, select:focus, textarea:focus {
 outline: none;
 border-color: #238636;
 box-shadow: 0 0 5px rgba(35, 134, 54, 0.3);
 }

 button {
 width: 100%;
 padding: 14px;
 background-color: #238636;
 color: white;
 border: none;
 border-radius: 6px;
 font-size: 1.1rem;
 font-weight: bold;
 cursor: pointer;
 text-transform: uppercase;
 transition: background-color 0.3s;
 }

 button:hover {
 background-color: #2ea043;
 }

 .status-message {
 margin-top: 1rem;
 text-align: center;
 display: none;
 }

 footer {
 margin-top: auto;
 padding: 2rem;
 text-align: center;
 color: #8b949e;
 font-size: 0.8rem;
 border-top: 1px solid #30363d;
 width: 100%;
 box-sizing: border-box;
 }

 .glitch {
 animation: glitch 1s linear infinite;
 }

 @keyframes glitch {
 2%, 64% { transform: translate(2px,0) skew(0deg); }
 4%, 60% { transform: translate(-2px,0) skew(0deg); }
 62% { transform: translate(0,0) skew(5deg); }
 }
 </style>
</head>
<body>

 <div class="container">
 <header>
 <h1 class="glitch">Hack Request</h1>
 <p class="subtitle">Secure Connection Established. Submit project requirement For analysis</p>
 </header>

 <form action="#" id="contact-form" >
 <div class="form-group">
 <label for="name">Anonymous Name</label>
 <input type="text" id="name" name="name" placeholder="Enter your identity" required>
 </div>

 <div class="form-group">
 <label for="email">Your Email Address</label>
 <input type="email" id="email" name="email" placeholder="secure@email.com" required>
 </div>

 <div class="form-group">
 <label for="type">Type of Hack</label>
 <select id="type" name="type">
 <option value="social">Social Engineering</option>
 <option value="phishing">Phishing Attacks</option>
 <option value="cloud">Cloud Breach / Server</option>
 <option value="mobile">Mobile Exploit</option>
 <option value="other">Other / Custom</option>
 </select>
 </div>

 <div class="form-group">
 <label for="target">Project Title</label>
 <input type="text" id="target" name="title" placeholder="IP Address, Email, or URL" required>
 </div>

 <div class="form-group">
 <label for="message">Project Description </label>
 <textarea id="message" name="message" rows="5" placeholder="Describe the objective..."></textarea>
 </div>

 <button id="submitpost" onclick="submitdata()"  type="submit">Initialize Protocol</button>
 </form>

 <div id="status" class="status-message">
 <p>Request transmitted. Waiting for agent response...</p>
 </div>
 </div>

 <footer>
 <p>&copy; 2026 Elite Cyber Solutions. All systems operational.</p>
 </footer>

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<script>
// ────────────────────────────────────────────────
// Do this ONLY ONCE when the page loads
// Never put your real keys in GitHub/public code!
// Use environment variables or a backend proxy in production
// ────────────────────────────────────────────────
(function() {
    emailjs.init("hW5ufftYD6dpwF7R1"); // Replace with your EmailJS User ID
  })();
// ────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  const form = document.getElementById('contact-form');
  const btn  = document.getElementById('submitpost');

  if (!form || !btn) return;

  form.addEventListener('submit', function(e) {
    e.preventDefault();

    // Disable button + visual feedback
    btn.disabled = true;
    btn.textContent = "Please wait...";

    emailjs.sendForm('service_rizflbw', 'template_n0jd6nf', this)
      .then(() => {
        alert(
          "We've received your project request!\n" +
          "A hacker will contact you via email within the next 10 minutes."
        );
        btn.textContent = "Project Posted ✓";
        form.reset();           // optional: clear form
      })
      .catch((error) => {
        alert('Failed to send. Error:\n' + JSON.stringify(error, null, 2));
        console.error(error);
        btn.textContent = "Try Again";
      })
      .finally(() => {
        btn.disabled = false;   // always re-enable
      });
  });
});
</script>
 <script>
 // Simple client-side interaction
 document.querySelector('form').addEventListener('submit', function(e) {
 e.preventDefault();
 const btn = document.querySelector('button');
 const originalText = btn.innerText;

 btn.innerText = "Encrypting & Sending...";
 btn.style.backgroundColor = "#8b949e";

 // Simulate sending
 setTimeout(() => {
 document.getElementById('status').style.display = 'block';
 btn.innerText = "Sent Successfully";
 btn.style.backgroundColor = "#238636";
 this.reset();
 }, 1500);
 });
 </script>
 
 
</body>
</html>
